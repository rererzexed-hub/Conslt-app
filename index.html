<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация на конференцию</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #c9a96e;
      --accent2: #e8c98a;
      --text: #f0ede6;
      --muted: #7a7a8a;
      --error: #e05c5c;
      --success: #5cb88a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 0 0 40px;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      padding: 48px 24px 36px;
      text-align: center;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(201,169,110,0.18) 0%, transparent 70%);
      pointer-events: none;
    }
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(201,169,110,0.35);
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(26px, 7vw, 36px);
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 12px;
    }
    .hero h1 span { color: var(--accent); }
    .hero p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto 24px;
    }

    .event-info {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(201,169,110,0.08);
      border: 1px solid rgba(201,169,110,0.2);
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--accent2);
    }
    .pill svg { width: 13px; height: 13px; }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 8px 0 28px;
    }

    .form-wrap {
      padding: 0 20px;
      max-width: 480px;
      margin: 0 auto;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    input::placeholder { color: #3a3a48; }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.12);
    }
    input.error { border-color: var(--error); }

    .error-msg {
      font-size: 12px;
      color: var(--error);
      margin-top: 5px;
      display: none;
    }
    .error-msg.show { display: block; }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #0d0d0f;
      cursor: pointer;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn .btn-text { position: relative; z-index: 1; }

    /* Success screen */
    .success-screen {
      display: none;
      text-align: center;
      padding: 60px 24px;
    }
    .success-screen.show { display: block; }
    .success-icon {
      width: 72px; height: 72px;
      background: rgba(92,184,138,0.12);
      border: 1px solid rgba(92,184,138,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .success-icon svg { width: 32px; height: 32px; color: var(--success); }
    .success-screen h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      margin-bottom: 12px;
      color: var(--text);
    }
    .success-screen p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* Кнопка "Вернуться в чат" */
    .close-btn {
      display: block;
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #0d0d0f;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .close-btn:active { transform: scale(0.98); }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0d0d0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }
  </style>
</head>
<body>

<div id="main">
  <div class="hero">
    <div class="badge">Регистрация открыта</div>
    <h1>Конференция<br/><span>2025</span></h1>
    <p>Заполни форму ниже и получи подтверждение сразу в Telegram</p>
    <div class="event-info">
      <div class="pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        15 марта 2025
      </div>
      <div class="pill">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Москва
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="form-wrap">
    <form id="regForm" novalidate>
      <div class="field">
        <label>Имя и фамилия</label>
        <input type="text" id="fullname" placeholder="Иван Иванов" autocomplete="name"/>
        <div class="error-msg" id="fullname-err">Введите имя и фамилию</div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="ivan@example.com" autocomplete="email"/>
        <div class="error-msg" id="email-err">Введите корректный email</div>
      </div>
      <div class="field">
        <label>Телефон</label>
        <input type="tel" id="phone" placeholder="+7 900 000 00 00" autocomplete="tel"/>
        <div class="error-msg" id="phone-err">Введите номер телефона</div>
      </div>
      <button type="submit" class="btn" id="submitBtn">
        <span class="btn-text">Зарегистрироваться →</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>
</div>

<div class="success-screen" id="successScreen">
  <div class="success-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <h2>Вы зарегистрированы!</h2>
  <p>Подтверждение придёт<br/>в этот чат в течение минуты.</p>
  <!-- ✅ Отдельный класс — кнопка всегда видна -->
  <button class="close-btn" id="closeBtn">Вернуться в чат →</button>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.setHeaderColor('#0d0d0f');
  tg.setBackgroundColor('#0d0d0f');

  const form = document.getElementById('regForm');
  const btn = document.getElementById('submitBtn');
  const closeBtn = document.getElementById('closeBtn');

  // ✅ Кнопка "Вернуться в чат" — отправляет данные и закрывает
closeBtn.addEventListener('click', function() {
  try {
    if (window._formData) {
      tg.sendData(window._formData);
    } else {
      tg.close();
    }
  } catch (e) {
    alert('Ошибка: ' + e.message);
  }
});

  
  
  
  
  function validate() {
    let ok = true;

    const name = document.getElementById('fullname');
    const nameErr = document.getElementById('fullname-err');
    if (!name.value.trim() || name.value.trim().split(' ').length < 2) {
      name.classList.add('error'); nameErr.classList.add('show'); ok = false;
    } else {
      name.classList.remove('error'); nameErr.classList.remove('show');
    }

    const email = document.getElementById('email');
    const emailErr = document.getElementById('email-err');
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRe.test(email.value.trim())) {
      email.classList.add('error'); emailErr.classList.add('show'); ok = false;
    } else {
      email.classList.remove('error'); emailErr.classList.remove('show');
    }

    const phone = document.getElementById('phone');
    const phoneErr = document.getElementById('phone-err');
    if (phone.value.trim().length < 7) {
      phone.classList.add('error'); phoneErr.classList.add('show'); ok = false;
    } else {
      phone.classList.remove('error'); phoneErr.classList.remove('show');
    }

    return ok;
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!validate()) return;

    btn.classList.add('loading');
    btn.disabled = true;

    // ✅ Сохраняем данные — отправим когда нажмут "Вернуться в чат"
    window._formData = JSON.stringify({
      fullname: document.getElementById('fullname').value.trim(),
      email: document.getElementById('email').value.trim(),
      phone: document.getElementById('phone').value.trim(),
    });

    // Показываем экран успеха
    setTimeout(() => {
      document.getElementById('main').style.display = 'none';
      document.getElementById('successScreen').classList.add('show');
    }, 600);
  });
</script>
</body>
</html>
